<body>
    <canvas id="canvas" width="522" height="300" style="margin:0 auto;display: block;"></canvas>
    <div style="width:522px;margin:0 auto;display: block;">
       预览 <input id="timeInput" type="range" min="0" max="100" style="width:480" value="0" />
    </div>
    <div style="width:522px;margin:0 auto;display: block;text-align: center;">
        <button onclick="play()">播放</button>
        <button onclick="pause()">暂停</button>
    </div>
    <script>

        const canvas = document.getElementById("canvas");
        const context = canvas.getContext("2d");

        const speed = 6; // 速度
        const density = 6; // 密度
        const size = 2; // 大小
        const degrees = 0; // 角度
        let direction = 'down'; // 方向


        // 背景图
        const myimg = new Image();
        myimg.src = "/static/img/city1.jpg";

        //构建构造函数 创建圆形 雨的形状
        function Circle() {
            // 角度（弧度制），+90度（垂直向下）
            this.angle = (degrees + 90) * Math.PI / 180
            // 雨滴圆旋转角度
            this.rotationAngle = degrees / 100;  // Math.random() * Math.PI; // 随机旋转角度
            // 速度
            this.speed = speed;

            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height - canvas.height * Math.sin(this.angle);
            this.width = Math.random() * size;
            this.height = Math.random() * 30;

            if (direction == 'up') {
                this.y = -this.y;
            }



            // 画一个矩形（雨滴）
            this.paint = function () {
                context.save(); // 保存画布状态

                // 只在绘制圆形时应用变换
                context.translate(this.x + this.width / 2, this.y + this.height / 2);
                context.rotate(this.rotationAngle);

                context.beginPath();
                context.fillStyle = "rgba(255,255,255,0.3)";
                context.fillRect(this.x, this.y, this.width, this.height);
                context.fill();

                context.restore(); // 恢复画布状态
            }

            // 设置移动步长，根据角度控制移动方向
            this.step = function () {
                // 根据角度计算x和y方向的速度分量
                if (direction == 'up') {
                    this.x -= this.speed * Math.cos(this.angle);
                    this.y -= this.speed * Math.sin(this.angle);
                }
                else {
                    this.x += this.speed * Math.cos(this.angle);
                    this.y += this.speed * Math.sin(this.angle);
                }


            }

            // // 设置角度（度）
            // this.setAngle = function(degrees) {
            //     this.angle = degrees * Math.PI / 180; // 转换为弧度
            // }

            // // 设置速度
            // this.setSpeed = function(newSpeed) {
            //     this.speed = newSpeed;
            // }
        }

         //定义一个全局数组，盛放圆片数组，初始化为0
        let circles = [];

        //将一个圆片放入圆的数组中
        function createCircles() {
            const circle = new Circle();
            circles[circles.length] = circle;
        }

        //将圆画出来
        function paintCircls() {
            for (let i = 0; i < circles.length; i++) {
                circles[i].paint();
            }
        }

        //将圆进行下移或者上移
        function stepCircles() {
            for (let i = 0; i < circles.length; i++) {
                circles[i].step();
            }
        }

        //执行下雨 
        function doRain(time) {
            context.drawImage(myimg, 0, 0); //刷新背景图片
            if (time % 2 == 0) {
                // 控制雨量
                for (let i = 0; i < density; i++) {
                    createCircles(); //新生成一个圆
                }
            }
            paintCircls(); //将当前页面所有圆绘出来
            stepCircles(); //圆向下走
        }

        // 监听 图片加载完成后进行初始化
        myimg.onload = function () {
            for (let count = 0; count < 50; count++) {
                doRain(0);
            }
        }

        // 监听 时间的前进和后退
        let preTime = 0;
        let preDirection=direction;
        document.getElementById('timeInput').addEventListener('input', (v) => {
            let time = v.target.value;
            if (preTime < time) {
                direction = 'down';
                doRain(time);
            }
            else {
                pause();
                direction = 'up';
                doRain(time);
            }

            if(preDirection!=direction){
                circles=circles.slice(-500);
            }

            preTime = time;
            preDirection=direction;
        })

        // 播放
        let playTimeHandler;
        function play() {
            pause();
            direction = 'down';
            let time = 0;
            playTimeHandler = setInterval(
                function () {
                    doRain(time);
                    time++;
                }, 10);
        }
        // 暂停
        function pause() {
            playTimeHandler && clearInterval(playTimeHandler);
        }

    </script>
</body>
