<!DOCTYPE html>
<html lang="en">
<!-- wordcloud2 词云 -->

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script async src="../js/wordcloud2.js"></script>
  <script src="../js/jquery-3.5.1.min.js"></script>
  <title>wordcloud2.js 词云</title>

  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      position: relative;
      text-align: center;
    }

    .loading {
      position: absolute;
      width: 100%;
      height: 100%;
      left: 0;
      top: 0;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* HEART LOADER */

    .heart-loader {
      background-color: #f44336;
      width: 50px;
      height: 50px;
      position: relative;
      -webkite-transform: rotate(45deg);
      -webkit-transform: rotate(45deg);
      -ms-transform: rotate(45deg);
      transform: rotate(45deg);
      -webkit-animation: pulsate 1s infinite;
      animation: pulsate 1s infinite;
    }

    .heart-loader::before,
    .heart-loader::after {
      display: inline-block;
      content: "";
      width: 50px;
      height: 50px;
      background-color: #f44336;
      position: absolute;
      border-radius: 50%;
    }

    .heart-loader::before {
      top: 0px;
      left: -25px;
    }

    .heart-loader::after {
      top: -25px;
      left: -0px;
    }

    @keyframes pulsate {
      0% {
        -webkit-transform: rotate(45deg) scale(0.8);
        transform: rotate(45deg) scale(0.8);
        transform: rotate(45deg) scale(0.8);
      }

      5% {
        -webkit-transform: rotate(45deg) scale(0.9);
        transform: rotate(45deg) scale(0.9);
      }

      10% {
        -webkit-transform: rotate(45deg) scale(0.8);
        transform: rotate(45deg) scale(0.8);
      }

      15% {
        -webkit-transform: rotate(45deg) scale(1);
        transform: rotate(45deg) scale(1);
      }

      50% {
        -webkit-transform: rotate(45deg) scale(0.8);
        transform: rotate(45deg) scale(0.8);
      }

      100% {
        -webkit-transform: rotate(45deg) scale(0.8);
        transform: rotate(45deg) scale(0.8);
      }
    }
  </style>
</head>

<body>
  <div class="loading">
    <!-- HEART LOADER   -->
    <div class="heart-loader"></div>
  </div>

  <div id="canvas-container">
    <!-- width="910" height="510" 要大于 style="width: 900px;height:500px" -->
    <canvas id="canvas" class="canvas" width="900" height="500" style="width: 900px; height: 500px"></canvas>
  </div>
  <script>
    var list = (function generateLoveList() {
      // 数值太大有可能渲染不出
      var list = [["Love", 10]];
      var nums = [5, 4, 3, 2, 2];
      // This list of the word "Love" in language of the world was taken from
      // the Language links of entry "Love" in English Wikipedia, with duplicate
      // spelling removed.
      var words = (
        "Liebe,ፍቅር,Lufu,حب,Aimor,Amor,Heyran,ভালোবাসা,Каханне,Любоў,Любов,བརྩེ་དུང་།," +
        "Ljubav,Karantez,Юрату,Láska,Amore,Cariad,Kærlighed,Armastus,Αγάπη,Amo,Amol,Maitasun," +
        "عشق,Pyar,Amour,Leafde,Gràdh,愛,爱,પ્રેમ,사랑,Սեր,Ihunanya,Cinta,ᑕᑯᑦᓱᒍᓱᑉᐳᖅ,Ást,אהבה," +
        "ಪ್ರೀತಿ,სიყვარული,Махаббат,Pendo,Сүйүү,Mīlestība,Meilė,Leefde,Bolingo,Szerelem," +
        "Љубов,സ്നേഹം,Imħabba,प्रेम,Ái,Хайр,အချစ်,Tlazohtiliztli,Liefde,माया,मतिना," +
        "Kjærlighet,Kjærleik,ପ୍ରେମ,Sevgi,ਪਿਆਰ,پیار,Miłość,Leevde,Dragoste," +
        "Khuyay,Любовь,Таптал,Dashuria,Amuri,ආදරය,Ljubezen,Jaceyl,خۆشەویستی,Љубав,Rakkaus," +
        "Kärlek,Pag-ibig,காதல்,ప్రేమ,ความรัก,Ишқ,Aşk,محبت,Tình yêu,Higugma,ליבע"
      ).split(",");

      nums.forEach(function (n) {
        words.forEach(function (w) {
          list.push([w, n]);
        });
      });

      return list;
      // return list.join('\n');
    })();

    window.onload = function () {
      $(function () {
        let el = document.getElementById("canvas");
        let options = {
          list: list,
          gridSize: Math.round((16 * $("#canvas").width()) / 1024),
          weightFactor: function (size) {
            return (Math.pow(size, 2.3) * $("#canvas").width()) / 1024;
          },
          fontFamily: "Times, serif",
          color: function (word, weight) {
            return weight === 10 ? "#f02222" : "#c09292";
          },
          // 旋转比率
          rotateRatio: 0.2,
          rotationSteps: 2,
          backgroundColor: "#ffe0e0",
        };
        console.log(options);
        setTimeout(() => {
          $(".loading").hide();
          WordCloud(el, options);
        }, 1000);
      });
    };
  </script>
</body>

</html>
