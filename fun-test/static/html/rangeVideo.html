    // 计算字节范围的准确方法
    function calculateRange(bitrate, startTime, endTime, totalSize, totalDuration) {
        // 方法1：直接用码率计算（最准确）
        const bitsPerSecond = bitrate; // 比特/秒
        const bytesPerSecond = bitsPerSecond / 8; // 字节/秒

        const startByte = Math.floor(bytesPerSecond * startTime);
        const endByte = Math.ceil(bytesPerSecond * endTime) - 1; // -1 因为 Range 包含结束字节

        // 确保不超过文件大小
        const finalEndByte = Math.min(endByte, totalSize - 1);

        return { startByte, endByte: finalEndByte };
    }

    // 检查moov是否在前面
    async function checkMoovPosition(videoUrl, totalBytes) {
        // 获取文件开头和结尾来检查 moov 位置
        const headResponse = await fetch(videoUrl, {
            headers: { 'Range': 'bytes=0-128' }
        });
        const headBuffer = await headResponse.arrayBuffer();

        const headView = new TextDecoder().decode(headBuffer);
        if (headView.includes('moov')) {
            return false; // moov 在开头
        }

        return true; // moov 可能在结尾
    }

    async function createPartialVideoWithHeader(videoUrl, startByte, endByte) {
        // 确保moov盒位于文件开头
        // ffmpeg -i input.mp4 -c copy -movflags +faststart output.mp4

        // 1. 获取原始文件头
        const headerResponse = await fetch(videoUrl, {
            headers: { 'Range': `bytes=0-${249172}` } // 249172 是moov元数据估算字节大小  
        });
        const headerBuffer = await headerResponse.arrayBuffer();

        // 2. 获取视频数据部分
        const dataResponse = await fetch(videoUrl, {
            headers: { 'Range': `bytes=${startByte}-${endByte}` }
        });
        const dataBuffer = await dataResponse.arrayBuffer();

        // 3. 合并缓冲区
        const combinedBuffer = new Uint8Array(headerBuffer.byteLength + dataBuffer.byteLength);
        combinedBuffer.set(new Uint8Array(headerBuffer), 0);
        combinedBuffer.set(new Uint8Array(dataBuffer), headerBuffer.byteLength);

        return new Blob([combinedBuffer], { type: 'video/mp4' });
    }
