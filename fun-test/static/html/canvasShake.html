<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canvas抖动特效</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #1a1a2e;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        h1 {
            margin-bottom: 10px;
            color: #4cc9f0;
            text-shadow: 0 0 8px rgba(76, 201, 240, 0.6);
        }
        .description {
            margin-bottom: 20px;
            text-align: center;
            max-width: 800px;
            line-height: 1.5;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        .canvas-wrapper {
            background-color: #162447;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            width: 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .canvas-wrapper h2 {
            margin: 0 0 15px 0;
            color: #e94560;
        }
        canvas {
            background-color: #0f3460;
            border-radius: 5px;
            margin-bottom: 15px;
        }
        .controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
        }
        button {
            background-color: #e94560;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #c53d54;
        }
        .slider-container {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        label {
            font-size: 14px;
        }
        input[type="range"] {
            width: 100%;
        }
    </style>
</head>
<body>
    <h1>Canvas抖动特效示例</h1>
    <p class="description">以下展示了三种不同的Canvas抖动效果：基础正弦波抖动、随机抖动和衰减抖动（模拟冲击效果）。</p>
    
    <div class="container">
        <div class="canvas-wrapper">
            <h2>基础抖动</h2>
            <canvas id="canvas1" width="250" height="200"></canvas>
            <div class="controls">
                <button id="shake1">触发抖动</button>
                <div class="slider-container">
                    <label for="intensity1">强度: <span id="intensityValue1">5</span></label>
                    <input type="range" id="intensity1" min="1" max="20" value="5">
                </div>
                <div class="slider-container">
                    <label for="speed1">速度: <span id="speedValue1">0.1</span></label>
                    <input type="range" id="speed1" min="1" max="20" value="5">
                </div>
            </div>
        </div>
        
        <div class="canvas-wrapper">
            <h2>随机抖动</h2>
            <canvas id="canvas2" width="250" height="200"></canvas>
            <div class="controls">
                <button id="shake2">触发抖动</button>
                <div class="slider-container">
                    <label for="intensity2">强度: <span id="intensityValue2">8</span></label>
                    <input type="range" id="intensity2" min="1" max="20" value="8">
                </div>
            </div>
        </div>
        
        <div class="canvas-wrapper">
            <h2>衰减抖动</h2>
            <canvas id="canvas3" width="250" height="200"></canvas>
            <div class="controls">
                <button id="shake3">触发抖动</button>
                <div class="slider-container">
                    <label for="intensity3">强度: <span id="intensityValue3">10</span></label>
                    <input type="range" id="intensity3" min="1" max="20" value="10">
                </div>
                <div class="slider-container">
                    <label for="decay3">衰减速度: <span id="decayValue3">0.9</span></label>
                    <input type="range" id="decay3" min="1" max="10" value="9">
                </div>
            </div>
        </div>
    </div>

    <script>
        // 获取Canvas元素和上下文
        const canvas1 = document.getElementById('canvas1');
        const ctx1 = canvas1.getContext('2d');
        const canvas2 = document.getElementById('canvas2');
        const ctx2 = canvas2.getContext('2d');
        const canvas3 = document.getElementById('canvas3');
        const ctx3 = canvas3.getContext('2d');

        // 绘制示例内容到Canvas
        function drawContent(ctx, text) {
            ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
            
            // 绘制背景网格
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.lineWidth = 1;
            for (let x = 0; x <= ctx.canvas.width; x += 20) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, ctx.canvas.height);
                ctx.stroke();
            }
            for (let y = 0; y <= ctx.canvas.height; y += 20) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(ctx.canvas.width, y);
                ctx.stroke();
            }
            
            // 绘制中心圆
            ctx.fillStyle = '#4cc9f0';
            ctx.beginPath();
            ctx.arc(ctx.canvas.width/2, ctx.canvas.height/2, 40, 0, Math.PI * 2);
            ctx.fill();
            
            // 绘制文本
            ctx.fillStyle = 'white';
            ctx.font = '16px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(text, ctx.canvas.width/2, ctx.canvas.height/2 + 90);
        }

        // 初始化绘制
        drawContent(ctx1, '基础正弦波抖动');
        drawContent(ctx2, '随机抖动');
        drawContent(ctx3, '衰减抖动');

        // 基础抖动（正弦波）
        let shaking1 = false;
        let time1 = 0;
        
        function animateShake1() {
            if (!shaking1) return;
            
            const intensity = parseInt(document.getElementById('intensity1').value);
            const speed = parseFloat(document.getElementById('speed1').value) / 10;
            
            // 使用正弦函数创建平滑的抖动效果
            const offsetX = Math.sin(time1 * 10) * intensity;
            const offsetY = Math.cos(time1 * 8) * intensity;
            
            ctx1.save();
            ctx1.clearRect(0, 0, canvas1.width, canvas1.height);
            ctx1.translate(offsetX, offsetY);
            drawContent(ctx1, '基础正弦波抖动');
            ctx1.restore();
            
            time1 += speed;
            requestAnimationFrame(animateShake1);
        }

        document.getElementById('shake1').addEventListener('click', function() {
            shaking1 = true;
            time1 = 0;
            animateShake1();
            
            // 3秒后停止抖动
            setTimeout(() => {
                shaking1 = false;
                drawContent(ctx1, '基础正弦波抖动');
            }, 3000);
        });

        // 随机抖动
        let shaking2 = false;
        
        function animateShake2() {
            if (!shaking2) return;
            
            const intensity = parseInt(document.getElementById('intensity2').value);
            
            // 使用随机值创建更剧烈的抖动效果
            const offsetX = (Math.random() - 0.5) * intensity * 2;
            const offsetY = (Math.random() - 0.5) * intensity * 2;
            
            ctx2.save();
            ctx2.clearRect(0, 0, canvas2.width, canvas2.height);
            ctx2.translate(offsetX, offsetY);
            drawContent(ctx2, '随机抖动');
            ctx2.restore();
            
            requestAnimationFrame(animateShake2);
        }

        document.getElementById('shake2').addEventListener('click', function() {
            shaking2 = true;
            animateShake2();
            
            // 1秒后停止抖动
            setTimeout(() => {
                shaking2 = false;
                drawContent(ctx2, '随机抖动');
            }, 1000);
        });

        // 衰减抖动（模拟冲击效果）
        let shaking3 = false;
        let shakePower3 = 0;
        
        function animateShake3() {
            if (!shaking3) return;
            
            const intensity = parseInt(document.getElementById('intensity3').value);
            const decay = parseFloat(document.getElementById('decay3').value) / 10;
            
            // 应用衰减
            shakePower3 *= decay;
            
            if (shakePower3 < 0.1) {
                shaking3 = false;
                drawContent(ctx3, '衰减抖动');
                return;
            }
            
            // 使用随机偏移，但强度随衰减减小
            const offsetX = (Math.random() - 0.5) * shakePower3 * intensity;
            const offsetY = (Math.random() - 0.5) * shakePower3 * intensity;
            
            ctx3.save();
            ctx3.clearRect(0, 0, canvas3.width, canvas3.height);
            ctx3.translate(offsetX, offsetY);
            drawContent(ctx3, '衰减抖动');
            ctx3.restore();
            
            requestAnimationFrame(animateShake3);
        }

        document.getElementById('shake3').addEventListener('click', function() {
            shaking3 = true;
            shakePower3 = 1;
            animateShake3();
        });

        // 更新滑块值显示
        document.getElementById('intensity1').addEventListener('input', function() {
            document.getElementById('intensityValue1').textContent = this.value;
        });
        
        document.getElementById('speed1').addEventListener('input', function() {
            document.getElementById('speedValue1').textContent = (this.value / 10).toFixed(1);
        });
        
        document.getElementById('intensity2').addEventListener('input', function() {
            document.getElementById('intensityValue2').textContent = this.value;
        });
        
        document.getElementById('intensity3').addEventListener('input', function() {
            document.getElementById('intensityValue3').textContent = this.value;
        });
        
        document.getElementById('decay3').addEventListener('input', function() {
            document.getElementById('decayValue3').textContent = (this.value / 10).toFixed(1);
        });
    </script>
</body>
</html>
