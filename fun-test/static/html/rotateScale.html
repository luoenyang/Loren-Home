<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片旋转裁剪与缩放</title>
    <style>
        /* 样式保持不变 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 1200px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            padding: 25px;
            margin-top: 20px;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }
        .description {
            text-align: center;
            margin-bottom: 30px;
            color: #7f8c8d;
            font-size: 1.1rem;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }
        .content {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
        }
        .original, .result {
            flex: 1;
            min-width: 300px;
            background: #ecf0f1;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 极客 0.1);
        }
        h2 {
            text-align: center;
            margin-bottom: 15px;
            color: #3498db;
        }
        .image-container {
            width: 100%;
            height: 400px;
            background: #000;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            margin-bottom: 15px;
            position: relative;
        }
        .image-container img, .image-container canvas {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        #resultCanvas{
            border:2px dotted rgb(255, 72, 0);
        }
        .controls {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 20px;
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .slider-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .slider-container label {
            min-width: 100px;
            font-weight: bold;
            color: #2c3e50;
        }
        input[type="range"] {
            flex: 1;
            height: 8px;
            -webkit-appearance: none;
            appearance: none;
            background: #d3d3d3;
            outline: none;
            border-radius: 4px;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #3498db;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        input[type="range"]::-webkit-slider-thumb:hover {
            background: #2980b9;
            transform: scale(1.1);
        }
        .value-display {
            min-width: 60px;
            text-align: center;
            font-weight: bold;
            color: #3498db;
            background: #ecf0f1;
            padding: 5px 10px;
            border-radius: 20px;
        }
        .buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 10px;
        }
        button {
            padding: 12px 25px;
            border: none;
            border-radius: 50px;
            background: #3498db;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        button:hover {
            background: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 6px 8px rgba(0, 0, 0, 0.15);
        }
        button:active {
            transform: translateY(0);
        }
        .info-panel {
            background: #2c3e50;
            color: #ecf0f1;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            font-family: 'Fira Code', monospace;
        }
        .info-panel h3 {
            color: #1abc9c;
            margin-bottom: 10px;
        }
        .info-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        .info-item span {
            font-weight: bold;
            color: #e74c3c;
        }
        @media (max-width: 768px) {
            .content {
                flex-direction: column;
            }
            .slider-container {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <h1>图片旋转与缩放</h1>
    <p class="description">旋转图片并缩放以完全覆盖容器 (类似 object-fit: cover)</p>
    
    <div class="container">
        <div class="content">
            <div class="original">
                <h2>原始图片</h2>
                <div class="image-container">
                    <img id="originalImage" src="https://images.unsplash.com/photo-1500462918059-b1a0cb512f1d?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=720&q=80" alt="Original Image">
                </div>
                <p class="image-info">原始尺寸: <span id="originalSize"></span></p>
            </div>
            <div class="result">
                <h2>旋转并缩放后的效果</h2>
                <div class="image-container">
                    <canvas id="resultCanvas" style="z-index:2"></canvas>
                    <img style="object-fit: contain;width:100%;height:100%;z-index: 1;position: absolute;left:0;top:0" id="originalImage_bg" src="https://images.unsplash.com/photo-1500462918059-b1a0cb512f1d?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=720&q=80" alt="Original Image">
                </div>
                <p class="image-info">目标尺寸: <span id="targetSize"></span></p>
            </div>
        </div>
        
        <div class="controls">
            <div class="control-group">
                <div class="slider-container">
                    <label for="angleSlider">旋转角度:</label>
                    <input type="range" id="angleSlider" min="0" max="360" value="0" step="1">
                    <div class="value-display"><span id="angleValue">0</span>°</div>
                </div>
            </div>
            
            <div class="buttons">
                <button id="resetBtn">重置角度</button>
                <button id="downloadBtn">下载图片</button>
            </div>
        </div>
        
        <div class="info-panel">
            <h3>图片信息</h3>
            <div class="info-item">
                <div>原始尺寸:</div>
                <div><span id="infoOriginalSize">0 × 0</span> px</div>
            </div>
            <div class="info-item">
                <div>缩放比例:</div>
                <div><span id="infoScale">1.00</span>x</div>
            </div>
        </div>
    </div>

    <script>
        // 获取DOM元素
        const originalImage = document.getElementById('originalImage');
        const resultCanvas = document.getElementById('resultCanvas');
        const ctx = resultCanvas.getContext('2d');
        const angleSlider = document.getElementById('angleSlider');
        const angleValue = document.getElementById('angleValue');
        const resetBtn = document.getElementById('resetBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const originalSize = document.getElementById('originalSize');
        const targetSize = document.getElementById('targetSize');
        const infoOriginalSize = document.getElementById('infoOriginalSize');
        const infoScale = document.getElementById('infoScale');
        const originalImage_bg=document.getElementById('originalImage_bg');
        
        // 设置目标尺寸,其实就是图片尺寸
        let targetWidth, targetHeight;
        
        // 初始旋转角度
        let rotationAngle = 0;
        
        // 更新角度显示
        angleSlider.addEventListener('input', function() {
            rotationAngle = parseInt(this.value);
            angleValue.textContent = rotationAngle;
            drawRotatedImage();
        });
        
        // 计算覆盖画布所需的最小缩放比例
        function calculateCoverScale(angle) {
            const rad = angle * Math.PI / 180;
            const sin = Math.abs(Math.sin(rad));
            const cos = Math.abs(Math.cos(rad));
            
            const imgWidth = originalImage.naturalWidth;
            const imgHeight = originalImage.naturalHeight;
            
            // 计算画布四个角的坐标（相对于画布中心）
            const corners = [
                { x: -targetWidth / 2, y: -targetHeight / 2 }, // 左上
                { x: targetWidth / 2, y: -targetHeight / 2 },  // 右上
                { x: -targetWidth / 2, y: targetHeight / 2 },  // 左下
                { x: targetWidth / 2, y: targetHeight / 2 }    // 右下
            ];
            
            let minScale = 0;
            
            // 对于每个角点，计算需要的最小缩放比例
            corners.forEach(corner => {
                // 将角点坐标反向旋转到图片坐标系
                const rotatedX = corner.x * Math.cos(-rad) - corner.y * Math.sin(-rad);
                const rotatedY = corner.x * Math.sin(-rad) + corner.y * Math.cos(-rad);
                
                // 计算这个角点在图片坐标系中需要的最小缩放比例
                const scaleX = Math.abs(rotatedX / (imgWidth / 2));
                const scaleY = Math.abs(rotatedY / (imgHeight / 2));
                
                // 取较大的缩放比例以确保覆盖
                const cornerScale = Math.max(scaleX, scaleY);
                
                // 更新全局最小缩放比例
                if (cornerScale > minScale) {
                    minScale = cornerScale;
                }
            });
            
            return minScale;
        }
        
        // 绘制旋转后的图片
        function drawRotatedImage() {
            // 清除画布
            ctx.clearRect(0, 0, resultCanvas.width, resultCanvas.height);
            
            // 设置画布背景为黑色
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, resultCanvas.width, resultCanvas.height);
            
            // 计算缩放比例
            const scale = calculateCoverScale(rotationAngle);
            
            // 更新信息面板
            updateInfoPanel(scale);
            
            // 保存当前状态
            ctx.save();
            
            // 移动到画布中心
            ctx.translate(resultCanvas.width / 2, resultCanvas.height / 2);
            
            // 旋转
            ctx.rotate(rotationAngle * Math.PI / 180);
            
            // 缩放
            ctx.scale(scale, scale);
            originalImage_bg.style.transform="scale("+scale+") rotate("+rotationAngle+"deg)";
            
            // 绘制图像（居中）
            ctx.drawImage(
                originalImage,
                -originalImage.naturalWidth / 2,
                -originalImage.naturalHeight / 2,
                originalImage.naturalWidth,
                originalImage.naturalHeight
            );
            
            // 恢复保存的状态
            ctx.restore();
        }
        
        // 更新信息面板
        function updateInfoPanel(scale) {
            infoOriginalSize.textContent = `${originalImage.naturalWidth} × ${originalImage.naturalHeight}`;
            infoScale.textContent = scale.toFixed(3);
        }
        
        // 重置角度按钮事件
        resetBtn.addEventListener('click', function() {
            rotationAngle = 0;
            angleSlider.value = 0;
            angleValue.textContent = 0;
            drawRotatedImage();
        });
        
        // 下载图片按钮事件
        downloadBtn.addEventListener('click', function() {
            const link = document.createElement('a');
            link.download = `rotated-image-${rotationAngle}deg.png`;
            link.href = resultCanvas.toDataURL('image/png');
            link.click();
        });
        
        // 图片加载完成后初始化
        originalImage.addEventListener('load', function() {
            // 设置目标尺寸为原始图片尺寸
            targetWidth = originalImage.naturalWidth;
            targetHeight = originalImage.naturalHeight;
            
            // 设置Canvas尺寸
            resultCanvas.width = targetWidth;
            resultCanvas.height = targetHeight;
            
            // 更新尺寸信息
            originalSize.textContent = `${targetWidth} × ${targetHeight} px`;
            targetSize.textContent = `${targetWidth} × ${targetHeight} px`;
            
            // 绘制初始图像
            drawRotatedImage();
        });
    </script>
</body>
</html>
